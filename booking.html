<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAccess</title>
    <link rel="shortcut icon" href="image-removebg-preview - 2026-05-04T111149.748.png" type="image/x-icon">
    <link rel="stylesheet" href="booking.css">
</head>
<body>

<div class="container">

    <h1>Appointment Booking</h1>
    <p class="subtitle">You can book into any hospital in MediAccess!</p>

    <section class="card">
        <h2>Patient Information</h2>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Age</label>
            <input type="number" placeholder="Enter your age">

            <label>Gender</label>
            <input type="text" placeholder="Enter your gender">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Department</label>
            <input type="text" placeholder="Enter department">

            <label>Appointment Date</label>
            <input type="date">

            <label>Appointment Time</label>
            <input type="time">

            <label>Additional Message</label>
            <textarea rows="5" placeholder="Write your message"></textarea>

            <button type="submit" class="book-btn"> <a href="Success.html">
                Book Appointment
            </a>
            </button>

        </form>
    </section>

    <button class="back">
        <a href="hospital.html"><<< Back</a>
    </button>

</div>

</body>
</html>
